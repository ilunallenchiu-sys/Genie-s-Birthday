<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Genie</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --text-color: #5d4037; --accent: #d84315; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Klee One', cursive; background: #8d6e63; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; background: #e0c9a6 url('https://www.transparenttextures.com/patterns/wood-pattern.png'); }
        .swiper-slide { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
        .content-card { background: rgba(255, 255, 255, 0.85); padding: 20px; border-radius: 20px; border: 2px solid #5d4037; width: 85%; max-width: 380px; min-height: 480px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; touch-action: pan-y; }
        .photo-box { width: 100%; aspect-ratio: 4/5; background: #fff; margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; position: relative; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .typewriter-text { font-size: 17px; line-height: 1.6; text-align: left; width: 100%; min-height: 80px; white-space: pre-wrap; color: var(--text-color); }
        .report-table { background: #fff; border: 1px solid #333; width: 100%; font-family: 'Arial', sans-serif; font-size: 13px; color: #333; text-align: left; border-collapse: collapse; margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid #ccc; padding: 8px; }
        .error-spot { cursor: pointer; position: relative; font-weight: bold; }
        .error-spot.found { color: var(--accent); text-decoration: line-through; }
        .error-spot.found::after { content: 'x'; position: absolute; left: -15px; color: red; }
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .custom-modal { background: #fffef9; width: 80%; max-width: 300px; padding: 25px; border-radius: 10px; border: 3px double #5d4037; text-align: center; }
        #videoOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; z-index:1000; justify-content:center; align-items:center; }
        video { width: 90%; border-radius: 10px; }
        h1 { font-size: 22px; margin: 5px 0; }
        .hint { font-size: 11px; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="custom-modal">
        <p id="modalMessage">正在掃描...</p>
        <button onclick="closeStyledModal()" style="margin-top:15px; padding:5px 20px; background:#5d4037; color:white; border:none; border-radius:15px;">好的</button>
    </div>
</div>

<div class="swiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <div class="content-card">
                <h1>HAPPY BIRTHDAY</h1>
                <h1>TO GENIE</h1>
                <p>Apr. 24, 2026</p>
                <div class="photo-box"><img src="1.jpg"></div>
                <p class="hint">(向右滑動翻閱內容)</p>
            </div>
        </div>
        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="2.jpg"></div>
                <div class="typewriter-text" data-text="Genie，生日快樂！\n這是我為妳準備的小驚喜。\n請翻開下一頁，幫我的年度財報除錯。"></div>
            </div>
        </div>
        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="3.jpg"></div>
                <div class="typewriter-text" data-text="妳的存在就像完美參數，\n讓我的世界穩定而幸福。"></div>
            </div>
        </div>
        <div class="swiper-slide">
            <div class="content-card">
                <h1>年度感情財務報表</h1>
                <div class="photo-box" style="height: 100px;"><img src="4.jpg" style="object-fit: contain;"></div>
                <p style="font-size: 13px;">請修正 3 處數據錯誤：</p>
                <table class="report-table">
                    <tr><th>項目</th><th>數據</th></tr>
                    <tr><td>幸福指數</td><td class="error-spot" onclick="findErr(this, '幸福應修正為 10000%！')">90%</td></tr>
                    <tr><td>年度擁抱</td><td class="error-spot" onclick="findErr(this, '這數值應該是無限大。')">12 次</td></tr>
                    <tr><td>耐心指數</td><td class="error-spot" onclick="findErr(this, '數據被低估，必須重新計算。')">不足</td></tr>
                </table>
                <div id="unlockHint" style="font-size: 12px; color: green; display: none; margin-top:10px;">審核通過！影片已解鎖，請往右滑。</div>
            </div>
        </div>
        <div class="swiper-slide">
            <div class="content-card">
                <h1 id="vTitle">影片未解鎖</h1>
                <div class="photo-box" id="vBox" style="filter: blur(10px); pointer-events: none;" onclick="playVideo()">
                    <img src="5.jpg">
                    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:60px; color:white;">Play</div>
                </div>
                <p id="vDesc">請先完成上一頁的財報審查。</p>
            </div>
        </div>
        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="6.jpg"></div>
                <div class="typewriter-text" data-text="恭喜除錯成功！\n妳是最棒的檢察官。\n生日快樂！❤️"></div>
            </div>
        </div>
        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="7.jpg"></div>
                <div class="typewriter-text" data-text="願我們像鑽石一樣閃耀且堅韌。\nHappy Birthday! 🎂"></div>
            </div>
        </div>
    </div>
</div>

<div id="videoOverlay" onclick="this.style.display='none'">
    <video id="birthdayVideo" controls src="v1.mp4"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    var swiperInstance = new Swiper('.swiper', {
        loop: false,
        observer: true,
        observeParents: true,
        on: { slideChangeTransitionEnd: function() { startTyping(this.activeIndex); } }
    });

    function showStyledModal(msg) {
        document.getElementById('modalMessage').textContent = msg;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeStyledModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function startTyping(idx) {
        var slides = document.querySelectorAll('.swiper-slide');
        if (!slides[idx]) return;
        var el = slides[idx].querySelector('.typewriter-text');
        if (el && !el.dataset.done) {
            var str = el.dataset.text.replace(/\\n/g, '\n');
            var i = 0;
            el.innerHTML = "";
            el.dataset.done = "true";
            function type() {
                if (i < str.length) {
                    el.innerHTML += str.charAt(i++);
                    setTimeout(type, 100);
                }
            }
            type();
        }
    }

    window.onload = function() {
        showStyledModal("發現異常財務活動：Genie 的生日報表需要審核！");
        startTyping(0);
        setTimeout(function() { swiperInstance.update(); }, 500);
    };

    var foundNum = 0;
    function findErr(el, msg) {
        if (el.classList.contains('found')) return;
        el.classList.add('found');
        foundNum = foundNum + 1;
        showStyledModal(msg);
        if (foundNum === 3) {
            document.getElementById('unlockHint').style.display = 'block';
            document.getElementById('vTitle').textContent = "影片已解鎖";
            document.getElementById('vBox').style.filter = "none";
            document.getElementById('vBox').style.pointer-events = "auto";
            document.getElementById('vDesc').textContent = "點擊照片開始播放！";
        }
    }

    function playVideo() {
        document.getElementById('videoOverlay').style.display = 'flex';
        document.getElementById('birthdayVideo').play();
    }
</script>
</body>
</html>
