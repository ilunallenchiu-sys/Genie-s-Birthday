<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Genie</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --text-color: #5d4037; --accent-color: #d84315; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Klee One', cursive; background: #8d6e63; overflow: hidden; }
        
        /* 木質調背景 */
        .swiper { width: 100%; height: 100%; background: #e0c9a6 url('https://www.transparenttextures.com/patterns/wood-pattern.png'); }
        .swiper-slide { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }

        .content-card { background: rgba(255, 255, 255, 0.85); padding: 20px; border-radius: 20px; border: 2px solid #5d4037; width: 85%; max-width: 380px; min-height: 480px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .photo-box { width: 100%; aspect-ratio: 4/5; background: #fff; margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; position: relative; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 手寫打字機效果 */
        .typewriter-text { font-size: 18px; line-height: 1.6; text-align: left; width: 100%; min-height: 80px; white-space: pre-wrap; color: var(--text-color); }

        /* 自定義裝飾彈窗 (Modal) */
        #modalOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; z-index: 2000; 
            justify-content: center; align-items: center; 
        }
        .custom-modal { 
            background: #fffef9; width: 80%; max-width: 300px; 
            padding: 30px; border-radius: 10px; position: relative;
            box-shadow: 0 0 0 5px #fffef9, 0 0 0 8px #5d4037; /* 雙層邊框 */
            text-align: center; color: var(--text-color);
        }
        /* 花邊裝飾角 */
        .custom-modal::before, .custom-modal::after {
            content: "✿"; position: absolute; font-size: 24px; color: #5d4037;
        }
        .custom-modal::before { top: 5px; left: 5px; }
        .custom-modal::after { bottom: 5px; right: 5px; }
        
        .modal-btn { 
            margin-top: 20px; padding: 8px 25px; background: #5d4037; 
            color: white; border: none; border-radius: 20px; font-family: 'Klee One';
        }

        /* 遊戲區域 */
        #gameWrapper { display: none; width: 100%; flex-direction: column; align-items: center; }
        #gameCanvas { background: rgba(255,255,255,0.4); border: 2px solid #5d4037; border-radius: 10px; touch-action: none; width: 300px; height: 350px; }
        .game-controls { display: flex; gap: 40px; margin-top: 15px; }
        .ctrl-btn { width: 60px; height: 60px; background: #5d4037; color: white; border: none; border-radius: 50%; font-size: 24px; }

        /* 影片 */
        #videoOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; z-index:1000; justify-content:center; align-items:center; }
        video { width: 90%; border-radius: 10px; }
        
        h1 { font-size: 24px; margin: 5px 0; }
        .hint { font-size: 12px; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="custom-modal">
        <p id="modalMessage">正在加載...</p>
        <button class="modal-btn" onclick="closeStyledModal()">確定</button>
    </div>
</div>

<div class="swiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <div class="content-card">
                <h1>HAPPY BIRTHDAY</h1>
                <h1>TO GENIE</h1>
                <p style="font-weight:bold;">Apr. 24, 2026</p>
                <div class="photo-box"><img src="p1.jpg"></div>
                <p class="hint">(點擊或向右滑動翻閱)</p>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="p2.jpg"></div>
                <div class="typewriter-text" data-text="Genie，生日快樂！\n這是我為妳準備的小世界。\n每一張照片都是我們的回憶。"></div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box" onclick="playVideo()">
                    <img src="p5.jpg">
                    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:60px; color:white;">▶️</div>
                </div>
                <div class="typewriter-text" data-text="點擊照片觀看影片"></div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <h1>🍰 接蛋糕挑戰</h1>
                <div id="gameWrapper">
                    <div style="margin-bottom:10px;">剩餘: <span id="timer">30</span>s | 分數: <span id="score">0</span></div>
                    <canvas id="gameCanvas" width="300" height="350"></canvas>
                    <div class="game-controls">
                        <button class="ctrl-btn" id="leftBtn">◀</button>
                        <button class="ctrl-btn" id="rightBtn">▶</button>
                    </div>
                </div>
                <button id="startBtn" onclick="initGame()" style="padding:15px 30px; font-size:20px; background:#5d4037; color:white; border:none; border-radius:50px; cursor:pointer;">開始遊戲</button>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <h1>遊戲結果</h1>
                <p style="font-size:40px; margin:20px 0;">得分：<span id="finalScore">0</span></p>
                <div class="typewriter-text" data-text="妳太厲害了！\n這是我見過最強的接蛋糕大師。"></div>
            </div>
        </div>
    </div>
</div>

<div id="videoOverlay" onclick="this.style.display='none'">
    <video id="birthdayVideo" controls src="v1.mp4"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // --- 彈窗邏輯 ---
    let modalQueue = [];
    let currentCallback = null;

    function showStyledModal(message, callback) {
        modalQueue.push({ message, callback });
        if (document.getElementById('modalOverlay').style.display !== 'flex') {
            processQueue();
        }
    }

    function processQueue() {
        if (modalQueue.length > 0) {
            const item = modalQueue.shift();
            document.getElementById('modalMessage').innerText = item.message;
            currentCallback = item.callback;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
    }

    function closeStyledModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        if (currentCallback) currentCallback();
        if (modalQueue.length > 0) setTimeout(processQueue, 300);
    }

    // --- 初始化翻頁 ---
    const swiper = new Swiper('.swiper', { 
        on: { slideChangeTransitionEnd: function() { startTyping(this.activeIndex); } } 
    });

    function startTyping(index) {
        const slide = document.querySelectorAll('.swiper-slide')[index];
        const el = slide.querySelector('.typewriter-text');
        if (el && !el.dataset.done) {
            const str = el.dataset.text.replace(/\\n/g, '\n');
            let i = 0; el.innerHTML = ""; el.dataset.done = "true";
            function type() { if (i < str.length) { el.innerHTML += str[i++]; setTimeout(type, 80); } }
            type();
        }
    }

    // --- 進入網頁的連環彈窗 ---
    window.onload = () => {
        showStyledModal("⚠️ 系統偵測：發現極高能量的可愛熱源！", () => {
            showStyledModal("正在進行材料分析...", () => {
                showStyledModal("分析結果：能量來源是 Genie！❤️", () => {
                    startTyping(0);
                });
            });
        });
    };

    function playVideo() { document.getElementById('videoOverlay').style.display='flex'; document.getElementById('birthdayVideo').play(); }

    // --- 接蛋糕遊戲邏輯 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const charImg = new Image(); charImg.src = 'character.png';

    let score = 0, timeLeft = 30, gameActive = false, playerX = 125, cakes = [];
    let moveLeft = false, moveRight = false;

    function initGame() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'flex';
        gameActive = true; runGame();
        const timerInt = setInterval(() => {
            timeLeft--; document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timerInt); gameActive = false; endGame(); }
        }, 1000);
    }

    document.getElementById('leftBtn').ontouchstart = () => moveLeft = true;
    document.getElementById('leftBtn').ontouchend = () => moveLeft = false;
    document.getElementById('rightBtn').ontouchstart = () => moveRight = true;
    document.getElementById('rightBtn').ontouchend = () => moveRight = false;

    function runGame() {
        if(!gameActive) return;
        ctx.clearRect(0,0,300,350);
        if(moveLeft && playerX > 0) playerX -= 5;
        if(moveRight && playerX < 250) playerX += 5;
        ctx.drawImage(charImg, playerX, 280, 50, 65);
        if(Math.random() < 0.04) cakes.push({x: Math.random()*270, y: 0});
        cakes.forEach((c, i) => {
            c.y += 4; ctx.font = "30px Arial"; ctx.fillText("🍰", c.x, c.y);
            if(c.y > 280 && c.y < 340 && c.x > playerX - 20 && c.x < playerX + 40) {
                score += 5; document.getElementById('score').innerText = score; cakes.splice(i, 1);
            }
        });
        requestAnimationFrame(runGame);
    }

    function endGame() {
        document.getElementById('finalScore').innerText = score;
        showStyledModal("挑戰結束！看看妳得到了幾分？", () => {
            swiper.slideTo(5);
        });
    }
</script>
</body>
</html>
