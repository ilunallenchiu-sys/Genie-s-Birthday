<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Genie</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --wood-bg: #d7b594; --text-color: #5d4037; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Klee One', cursive; background: #8d6e63; overflow: hidden; }
        
        /* 木質調背景 */
        .swiper { width: 100%; height: 100%; background: #e0c9a6 url('https://www.transparenttextures.com/patterns/wood-pattern.png'); }
        .swiper-slide { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; color: var(--text-color); }

        .content-card { background: rgba(255, 255, 255, 0.85); padding: 25px; border-radius: 20px; border: 2px solid #5d4037; width: 85%; max-width: 400px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2); min-height: 450px; }
        .photo-box { width: 100%; aspect-ratio: 4/5; background: #fff; margin-bottom: 15px; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 手寫文字樣式 */
        .typewriter-text { 
            font-size: 18px; 
            line-height: 1.8; 
            text-align: left; 
            min-height: 100px; 
            white-space: pre-wrap; /* 保留換行 */
        }
        
        /* 游標效果 */
        .typewriter-text::after { content: "|"; animation: blink 0.7s infinite; margin-left: 5px; color: var(--text-color); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        h1 { margin: 5px 0; font-size: 26px; }
        .date { font-size: 18px; margin-bottom: 15px; color: #795548; font-weight: bold; }
        
        /* 遊戲畫布與影片樣式 */
        #gameCanvas { background: rgba(255,255,255,0.3); border: 2px solid #5d4037; border-radius: 15px; display: none; touch-action: none; width: 100%; max-width: 300px; }
        #videoOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; z-index:1000; justify-content:center; align-items:center; }
        video { width: 95%; max-width: 500px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <div class="content-card">
                <h1>HAPPY BIRTHDAY</h1>
                <h1>TO GENIE</h1>
                <div class="date">Apr. 24, 2026</div>
                <div class="photo-box"><img src="p1.jpg" alt="Photo 1"></div>
                <p style="font-size: 12px; opacity: 0.6;">(點擊或向右滑動翻閱)</p>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="p2.jpg" alt="Photo 2"></div>
                <div class="typewriter-text" data-text="親愛的 Genie：\n這是我為妳準備的第一個驚喜。\n希望妳會喜歡這份手寫的感覺。"></div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="p3.jpg" alt="Photo 3"></div>
                <div class="typewriter-text" data-text="雖然平時都在忙著研究鑽石，\n但對妳的愛比鑽石更堅硬。"></div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box" onclick="playVideo()">
                    <img src="p5.jpg" alt="Photo 5">
                    <div style="position:absolute; font-size:60px; color:white;">▶️</div>
                </div>
                <div class="typewriter-text" data-text="點擊照片看看驚喜影片吧！"></div>
            </div>
        </div>

        <div class="swiper-slide">
            <h1>🍰 接蛋糕挑戰</h1>
            <canvas id="gameCanvas" width="300" height="400"></canvas>
            <button id="startBtn" onclick="startGame()" style="padding:15px 40px; font-size:20px; background:#5d4037; color:white; border:none; border-radius:50px;">開始遊戲</button>
        </div>

        <div class="swiper-slide">
            <div class="content-card">
                <div class="photo-box"><img src="p6.jpg" alt="Photo 6"></div>
                <div class="typewriter-text" data-text="Happy Birthday, Genie!\n願妳的 2026 年充滿笑容。"></div>
            </div>
        </div>
    </div>
</div>

<div id="videoOverlay" onclick="closeVideo()">
    <video id="birthdayVideo" controls src="v1.mp4" playsinline></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // 1. 初始化翻頁
    const swiper = new Swiper('.swiper', { 
        loop: false, 
        mousewheel: true,
        on: {
            slideChangeTransitionEnd: function () {
                startTyping(this.activeIndex); // 切換結束後觸發打字
            }
        }
    });

    // 2. 打字機邏輯
    function startTyping(index) {
        const activeSlide = document.querySelectorAll('.swiper-slide')[index];
        const textElement = activeSlide.querySelector('.typewriter-text');
        
        if (textElement && !textElement.getAttribute('data-done')) {
            const fullText = textElement.getAttribute('data-text').replace(/\\n/g, '\n');
            let i = 0;
            textElement.innerHTML = "";
            textElement.setAttribute('data-done', 'true'); // 標記已跑過動畫

            function type() {
                if (i < fullText.length) {
                    textElement.innerHTML += fullText.charAt(i);
                    i++;
                    setTimeout(type, 100); // 打字速度，越小越快
                }
            }
            type();
        }
    }

    // 初始頁面手寫
    window.onload = () => startTyping(0);

    // 影片與遊戲邏輯 (保留你之前的設定)
    function playVideo() { document.getElementById('videoOverlay').style.display = 'flex'; document.getElementById('birthdayVideo').play(); }
    function closeVideo() { document.getElementById('birthdayVideo').pause(); document.getElementById('videoOverlay').style.display = 'none'; }
    // ... 遊戲部分的 JavaScript 代碼請保留你原本的內容 ...
</script>
</body>
</html>
